services:
  postgres:
    image: postgres:16
    container_name: execra_postgres
    restart: always
    environment:
      POSTGRES_DB: execra
      POSTGRES_USER: execra
      POSTGRES_PASSWORD: execra_local_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: execra_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: