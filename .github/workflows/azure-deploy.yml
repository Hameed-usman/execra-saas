name: Deploy FastAPI to Azure

on:
  push:
    branches:
      - main  # Change this to your default branch name if different
    paths:
      - 'ai-backend/**'
      - '.github/workflows/azure-deploy.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Log in to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Log in to Azure Container Registry
      run: |
        az acr login --name ${{ secrets.ACR_NAME }}

    - name: Build and Push Docker Image
      run: |
        docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/ai-backend:${{ github.sha }} ./ai-backend
        docker push ${{ secrets.ACR_LOGIN_SERVER }}/ai-backend:${{ github.sha }}
        docker tag ${{ secrets.ACR_LOGIN_SERVER }}/ai-backend:${{ github.sha }} ${{ secrets.ACR_LOGIN_SERVER }}/ai-backend:latest
        docker push ${{ secrets.ACR_LOGIN_SERVER }}/ai-backend:latest

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
        images: '${{ secrets.ACR_LOGIN_SERVER }}/ai-backend:latest'
