name: Deploy AI Backend to Azure

on:
  push:
    branches:
      - main
    paths:
      - 'ai-backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Dependencies install
        run: |
          cd ai-backend
          pip install -r requirements.txt

      - name: Azure par deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: execra-ai-backend
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./ai-backend